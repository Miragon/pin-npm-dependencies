name: 'Pin npm Dependencies'
description: 'Fails the build if any npm dependency uses a version range (^ or ~) instead of an exact pinned version. Works with npm, yarn, and pnpm.'
author: 'Miragon GmbH'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  files:
    description: 'Newline-separated list of explicit package.json paths to check. When set, root-path is ignored.'
    required: false
    default: ''
  root-path:
    description: 'Root directory to scan recursively for package.json files (node_modules, .git, dist, build excluded). Used when files is not set.'
    required: false
    default: '.'
  check-peer-dependencies:
    description: 'Also check peerDependencies (default: false, since ranges are common there)'
    required: false
    default: 'false'
  check-optional-dependencies:
    description: 'Also check optionalDependencies (default: true, since these are typically installed)'
    required: false
    default: 'true'

runs:
  # Node.js LTS runtime — update when current LTS changes (track https://nodejs.org/en/about/previous-releases)
  using: node22
  main: src/index.js
